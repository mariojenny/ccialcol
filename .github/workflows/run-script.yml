name: Update HTML Automatically

on:
  schedule:
    # Cambiado a: Ejecutar todos los días a las 05:15 AM UTC
    - cron: "15 5 * * *"  
  workflow_dispatch: # Permite ejecutarlo manualmente para pruebas

jobs:
  update-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas

      - name: Run script
        run: python updater.py
        
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # AQUÍ ESTÁ EL IF QUE FALTABA:
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Auto update: Password changed via CSV"
            git push
            echo "Cambios subidos exitosamente."
          else
            echo "No se detectaron cambios para la fecha de hoy. Nada que subir."
          fi
